# Hermetic test catalog for e2e smoke and real-apply unit tests.
schema_version = 1

[[tool]]
id = "e2e-mcp"
kind = "mcp_server"
name = "E2E MCP"
summary = "Hermetic MCP fixture for the e2e smoke."
provenance = "test:e2e-mcp"
homepage = ""
approved = true
foundational = false
permissions = ["none"]
install_scope = "project"
secrets = []
artifacts = []
mcp_name = "e2e"
verify_argv = []
catalog_version = "1"
  [[tool.match]]
  any_files = ["*"]
  weight = 2
  [[tool.apply]]
  apply_via = "claude_mcp"
  harness = "claude_code"
  mcp_command = "echo"
  mcp_args = ["hi"]
  [[tool.apply]]
  apply_via = "codex_mcp"
  harness = "codex"
  mcp_command = "echo"
  mcp_args = ["hi"]

[[tool]]
id = "e2e-plugin"
kind = "plugin"
name = "E2E plugin"
summary = "Hermetic plugin fixture."
provenance = "test:e2e-plugin"
homepage = ""
approved = true
foundational = false
permissions = ["none"]
install_scope = "user"
secrets = []
artifacts = []
mcp_name = ""
verify_argv = []
catalog_version = "1"
  [[tool.match]]
  any_files = ["*"]
  weight = 2
  [[tool.apply]]
  apply_via = "claude_plugin"
  harness = "claude_code"
  plugin_ref = "e2e-plugin@marketplace"

[[tool]]
id = "e2e-skill"
kind = "skill"
name = "E2E skill"
summary = "Hermetic scaffold fixture."
provenance = "toolbelt:scaffold"
homepage = ""
approved = true
foundational = false
permissions = ["none"]
install_scope = "repo-committed"
secrets = []
artifacts = []
mcp_name = ""
verify_argv = []
catalog_version = "1"
  [[tool.match]]
  any_files = ["*"]
  weight = 2
  [[tool.apply]]
  apply_via = "scaffold"
  harness = "claude_code"
  scaffold_path = ".claude/skills/e2e/SKILL.md"
  scaffold_body = "e2e skill fixture\n"
