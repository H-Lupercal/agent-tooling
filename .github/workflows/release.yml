name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev --locked
      - run: uv run pytest -m "not distribution" -q
      - run: uv run pytest -m distribution -q
      - run: PYTHON=.venv/bin/python bash tests/e2e_smoke.sh
      - run: uv run pip-audit
      - run: uv build --offline
      - run: uv run twine check dist/*
      - name: Verify tag matches package version
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(uv run python -c 'from conductor import __version__; print(__version__)')"
      - name: Create release metadata
        run: |
          uv run cyclonedx-py environment --pyproject pyproject.toml --mc-type library --output-reproducible --of JSON -o "dist/codex-conductor-${GITHUB_REF_NAME}.cdx.json"
          cd dist
          sha256sum *.whl *.tar.gz *.cdx.json > SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/codex-conductor/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist
      - name: Stage Python distributions
        run: |
          mkdir packages
          cp dist/*.whl dist/*.tar.gz packages/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
