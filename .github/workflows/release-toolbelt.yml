name: Release toolbelt-ai

on:
  push:
    tags: ["toolbelt-v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-toolbelt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    name: Build and verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to sign the provenance attestation with GitHub OIDC.
      id-token: write
      # Required to persist the provenance attestation.
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: false
      - run: uv sync --extra dev --locked
        working-directory: toolbelt
      - run: uv run pytest -m "not distribution" --cov=src/toolbelt --cov-branch --cov-fail-under=90
        working-directory: toolbelt
      - run: uv run pytest -m distribution -q
        working-directory: toolbelt
      - run: PYTHON=.venv/bin/python bash tests/e2e_smoke.sh
        working-directory: toolbelt
      - run: uv run pip-audit
        working-directory: toolbelt
      - name: Verify tag matches package version
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "toolbelt-v$(uv run python -c 'from toolbelt import __version__; print(__version__)')"
        working-directory: toolbelt
      - run: uv build --offline --clear
        working-directory: toolbelt
      - run: uv run twine check dist/*.whl dist/*.tar.gz
        working-directory: toolbelt
      - name: Create release metadata
        shell: bash
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements.txt --output-file build/runtime-requirements.txt --quiet
          uv venv --clear --python 3.13 build/sbom-venv
          uv pip install --link-mode=copy --python build/sbom-venv -r build/runtime-requirements.txt dist/*.whl
          uv run cyclonedx-py environment build/sbom-venv --pyproject pyproject.toml --mc-type library --output-reproducible --of JSON --output-file "dist/toolbelt-ai-${GITHUB_REF_NAME}.cdx.json"
          uv run --offline --no-project --python build/sbom-venv python scripts/finalize_sbom.py --input "dist/toolbelt-ai-${GITHUB_REF_NAME}.cdx.json" --distribution toolbelt-ai
          cd dist
          sha256sum *.whl *.tar.gz *.cdx.json > SHA256SUMS
        working-directory: toolbelt
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            toolbelt/dist/*.whl
            toolbelt/dist/*.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: toolbelt-pypi-distributions
          path: |
            toolbelt/dist/*.whl
            toolbelt/dist/*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: toolbelt-release-assets
          path: toolbelt/dist/*
          if-no-files-found: error

  publish:
    name: Publish
    needs: build-and-verify
    runs-on: ubuntu-latest
    permissions:
      # Required to create or repair the GitHub release.
      contents: write
      # Required for PyPI Trusted Publishing.
      id-token: write
    environment:
      name: pypi-toolbelt
      url: https://pypi.org/project/toolbelt-ai/
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: toolbelt-pypi-distributions
          path: toolbelt-pypi-dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: toolbelt-pypi-dist/
          skip-existing: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: toolbelt-release-assets
          path: toolbelt-release-assets
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" toolbelt-release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" toolbelt-release-assets/* --verify-tag --generate-notes
          fi
