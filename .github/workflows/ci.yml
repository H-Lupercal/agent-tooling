name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-contract:
    name: Release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: codex-conductor/uv.lock
      - run: uv sync --directory codex-conductor --extra dev --locked
      - run: >-
          uv run --directory codex-conductor pytest
          ../tests/test_release_contract.py -q

  quality:
    name: Quality (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [toolbelt, codex-conductor]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        working-directory: ${{ matrix.project }}
      - run: make format-check PYTHON=.venv/bin/python
        working-directory: ${{ matrix.project }}
      - run: make lint PYTHON=.venv/bin/python
        working-directory: ${{ matrix.project }}
      - run: make typecheck PYTHON=.venv/bin/python
        working-directory: ${{ matrix.project }}

  install-rehearsal:
    name: Install Rehearsal (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: install-rehearsal/uv.lock
      - run: uv sync --extra dev --locked
        env:
          UV_PYTHON: ${{ matrix.python }}
        working-directory: install-rehearsal
      - run: uv run ruff format --check src tests
        working-directory: install-rehearsal
      - run: uv run ruff check src tests
        working-directory: install-rehearsal
      - run: uv run pyright
        working-directory: install-rehearsal
      - run: uv run pytest -q
        working-directory: install-rehearsal
      - run: uv build --offline --clear
        working-directory: install-rehearsal

  test:
    name: Tests (${{ matrix.project }}, ${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        project: [toolbelt, codex-conductor]
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        env:
          UV_PYTHON: ${{ matrix.python }}
        working-directory: ${{ matrix.project }}
      - run: uv run pytest -m "not distribution" -q
        working-directory: ${{ matrix.project }}

  coverage:
    name: Coverage (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: toolbelt
            coverage-source: src/toolbelt
          - project: codex-conductor
            coverage-source: conductor
          - project: install-rehearsal
            coverage-source: install_rehearsal
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        working-directory: ${{ matrix.project }}
      - run: >-
          uv run pytest -m "not distribution"
          --cov="$COVERAGE_SOURCE" --cov-branch
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=90
        env:
          COVERAGE_SOURCE: ${{ matrix.coverage-source }}
        working-directory: ${{ matrix.project }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.project }}-coverage
          path: ${{ matrix.project }}/coverage.xml
          if-no-files-found: error

  distribution:
    name: Distribution (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [toolbelt, codex-conductor]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        working-directory: ${{ matrix.project }}
      - run: uv run pytest -m distribution -q
        working-directory: ${{ matrix.project }}
      - run: uv build --offline --clear
        working-directory: ${{ matrix.project }}
      - run: uv run twine check dist/*.whl dist/*.tar.gz
        working-directory: ${{ matrix.project }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.project }}-distributions
          path: ${{ matrix.project }}/dist/*
          if-no-files-found: error

  e2e:
    name: End to end (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [toolbelt, codex-conductor]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        working-directory: ${{ matrix.project }}
      - name: Run end-to-end smoke test
        shell: bash
        run: PYTHON=.venv/bin/python bash tests/e2e_smoke.sh
        working-directory: ${{ matrix.project }}

  supply-chain:
    name: Supply chain (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: toolbelt
            distribution: toolbelt-ai
          - project: codex-conductor
            distribution: codex-conductor
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.project }}/uv.lock
      - run: uv sync --extra dev --locked
        working-directory: ${{ matrix.project }}
      - run: uv run pip-audit
        working-directory: ${{ matrix.project }}
      - run: uv build --offline --clear
        working-directory: ${{ matrix.project }}
      - run: >-
          uv export --locked --no-dev --no-emit-project
          --format requirements.txt
          --output-file build/runtime-requirements.txt --quiet
        working-directory: ${{ matrix.project }}
      - run: uv venv --clear --python 3.13 build/sbom-venv
        working-directory: ${{ matrix.project }}
      - run: >-
          uv pip install --link-mode=copy --python build/sbom-venv
          -r build/runtime-requirements.txt dist/*.whl
        working-directory: ${{ matrix.project }}
      - run: >-
          uv run cyclonedx-py environment build/sbom-venv
          --pyproject pyproject.toml
          --mc-type library --output-reproducible --of JSON
          --output-file sbom.cdx.json
        working-directory: ${{ matrix.project }}
      - run: >-
          uv run --offline --no-project --python build/sbom-venv
          python scripts/finalize_sbom.py --input sbom.cdx.json
          --distribution "$SBOM_DISTRIBUTION"
        env:
          SBOM_DISTRIBUTION: ${{ matrix.distribution }}
        working-directory: ${{ matrix.project }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.project }}-sbom
          path: ${{ matrix.project }}/sbom.cdx.json
          if-no-files-found: error
