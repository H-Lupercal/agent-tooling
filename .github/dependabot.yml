version: 2
updates:
  - package-ecosystem: pip
    directory: /toolbelt
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /codex-conductor
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
