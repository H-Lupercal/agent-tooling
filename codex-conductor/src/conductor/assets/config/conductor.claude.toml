# codex-conductor v2 admission policy for Claude Code. Configure verified prices before reporting cost.
schema_version = 2

[budget]
run_usd_cap = 10.00
warn_at_fraction = 0.75
enforce = true

[policy]
max_depth = 2
require_strictly_cheaper = true
same_tier_spawns_from_root_max = 2
minimum_mode = "admission"

[[tiers]]
name = "frontier"
model = "claude-opus-4-8"
generation_rank = 48
capability_rank = 100
reasoning_effort = "high"
enabled = "always"
relative_cost_weight = 100
est_task_usd = 2.00
max_concurrent = 2
may_spawn = true
task_classes = ["architecture", "high_risk", "integration", "review_gate"]

[tiers.pricing]
input_usd_per_mtok = 0.0
cache_read_usd_per_mtok = 0.0
cache_write_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0

