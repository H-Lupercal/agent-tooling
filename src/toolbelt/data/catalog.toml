# Toolbelt v2 seed catalog. Commands are contract-tested and version-pinned.
schema_version = 2

[[tool]]
schema_version = 2
id = "mcp-filesystem"
name = "Filesystem MCP"
summary = "Repository-scoped filesystem access when the harness has no native equivalent"
kind = "mcp_server"
provenance = "npm:@modelcontextprotocol/server-filesystem@2026.7.4"
version = "2026.7.4"
homepage = "https://github.com/modelcontextprotocol/servers"
license = "MIT"
platforms = ["linux", "macos", "windows"]
harnesses = ["codex"]
permissions = ["network", "filesystem-read", "filesystem-write", "process-spawn"]
install_scope = "user"
artifacts = []
required_env = []
strong_evidence = ["infra:repository"]
weak_evidence = []
required_capabilities = ["codex"]
suppressed_by_capabilities = ["filesystem"]
live_name = "mcp-filesystem"
install = { argv = ["codex", "mcp", "add", "filesystem", "--", "npx", "-y", "@modelcontextprotocol/server-filesystem@2026.7.4", "."], requires_network = true }
verify = { argv = ["codex", "mcp", "get", "filesystem"] }
rollback = { argv = ["codex", "mcp", "remove", "filesystem"] }
enabled = true

[[tool]]
schema_version = 2
id = "mcp-git"
name = "Git MCP"
summary = "Repository history and diff access when the harness has no native Git capability"
kind = "mcp_server"
provenance = "pypi:mcp-server-git==2026.6.16"
version = "2026.6.16"
homepage = "https://github.com/modelcontextprotocol/servers"
license = "MIT"
platforms = ["linux", "macos", "windows"]
harnesses = ["codex"]
permissions = ["network", "filesystem-read", "filesystem-write", "process-spawn"]
install_scope = "user"
artifacts = []
required_env = []
strong_evidence = ["infra:git_repository"]
weak_evidence = []
required_capabilities = ["codex"]
suppressed_by_capabilities = ["git"]
live_name = "mcp-git"
install = { argv = ["codex", "mcp", "add", "git", "--", "uvx", "--from", "mcp-server-git==2026.6.16", "mcp-server-git", "--repository", "."], requires_network = true }
verify = { argv = ["codex", "mcp", "get", "git"] }
rollback = { argv = ["codex", "mcp", "remove", "git"] }
enabled = true

