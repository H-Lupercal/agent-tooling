  brief_keywords = ["end to end", "browser test", "e2e"]
  weight = 1
  [[tool.apply]]
  apply_via = "claude_mcp"
  harness = "claude_code"
  mcp_command = "npx"
  mcp_args = ["-y", "@playwright/mcp@latest"]
  [[tool.apply]]
  apply_via = "codex_mcp"
  harness = "codex"
  mcp_command = "npx"
  mcp_args = ["-y", "@playwright/mcp@latest"]

[[tool]]
id = "mcp-postgres"
kind = "connector"
name = "Postgres MCP"
summary = "Query and inspect a Postgres database the project uses."
provenance = "npm:@modelcontextprotocol/server-postgres"
homepage = "https://github.com/modelcontextprotocol/servers"
approved = true
foundational = false
permissions = ["network", "credentials-read"]
install_scope = "project"
secrets = ["DATABASE_URL"]
artifacts = []
mcp_name = "postgres"
verify_argv = []
catalog_version = "1"
# NOTE: v1 policy forbids secrets in args/config, so this entry passes no
# connection string; the server must read DATABASE_URL from its process
# environment (inherited from the harness). If this server version requires an
# argv connection string, `toolbelt verify`/first use will surface it and the
# user edits the catalog entry — do NOT add the secret to mcp_args.
  [[tool.match]]
  infra = ["postgres"]
  weight = 3
  [[tool.match]]
  manifest_file = "package.json"
  manifest_deps = ["pg", "postgres"]
  weight = 2
  [[tool.match]]
  manifest_file = "pyproject.toml"
  manifest_deps = ["psycopg", "psycopg2", "asyncpg"]
  weight = 2
  [[tool.match]]
  brief_keywords = ["postgres", "postgresql"]
  weight = 1
  [[tool.apply]]
  apply_via = "claude_mcp"
  harness = "claude_code"
  mcp_command = "npx"
  mcp_args = ["-y", "@modelcontextprotocol/server-postgres"]
  [[tool.apply]]
  apply_via = "codex_mcp"
  harness = "codex"
  mcp_command = "npx"
  mcp_args = ["-y", "@modelcontextprotocol/server-postgres"]

