[[tool]]
id = "skill-toolbelt-conventions"
kind = "skill"
name = "Toolbelt conventions skill"
summary = "Repo-committed skill telling assistants how this repo's toolchain is managed."
provenance = "toolbelt:scaffold"
homepage = ""
approved = true
foundational = true
permissions = ["none"]
install_scope = "repo-committed"
secrets = []
artifacts = []
mcp_name = ""
verify_argv = []
catalog_version = "1"
  [[tool.match]]
  any_files = ["*"]
  weight = 2
  [[tool.apply]]
  apply_via = "scaffold"
  harness = "claude_code"
  scaffold_path = ".claude/skills/toolbelt-conventions/SKILL.md"
  scaffold_body = """
---
name: toolbelt-conventions
description: Use when working in this repo - explains the managed AI toolchain and where its manifest lives
---

# Toolbelt conventions

This repo's AI toolchain is managed by `toolbelt`. The manifest at
`.toolbelt/manifest.json` records every managed MCP server, plugin, skill,
LSP, and dev tool: why it was installed, what secrets it needs, and how to
remove it.

- Check the manifest before adding or removing MCP servers or plugins by
  hand; prefer `toolbelt plan` + `toolbelt apply`.
- Never commit `.toolbelt/secrets.env`, `.toolbelt/state/`, or
  `.toolbelt/plan.json` (the managed `.gitignore` block covers them).
- If a managed tool misbehaves, run `toolbelt verify --tool <id>`.
- If the stack changed, run `toolbelt reconcile` to realign the toolchain.
"""
  [[tool.apply]]
  apply_via = "managed_block"
  harness = "codex"
  block_path = "AGENTS.md"
  block_body = """
## Toolbelt-managed toolchain

This repo's AI toolchain is managed by `toolbelt`. The manifest at
`.toolbelt/manifest.json` records every managed MCP server, plugin, skill, LSP,
and dev tool: why it was installed, what secrets it needs, and how to remove it.

- Prefer `toolbelt plan` + `toolbelt apply` over adding MCP servers by hand;
  check the manifest first.
- Never commit `.toolbelt/secrets.env`, `.toolbelt/state/`, or
  `.toolbelt/plan.json` (the managed `.gitignore` block covers them).
- If a managed tool misbehaves, run `toolbelt verify --tool <id>`.
- If the stack changed, run `toolbelt reconcile` to realign the toolchain.
"""

