# toolbelt catalog. Read-only data. One [[tool]] per entry.
schema_version = 1

[[tool]]
id = "mcp-filesystem"
kind = "mcp_server"
name = "Filesystem MCP"
summary = "Read/write access to the project tree for the assistant."
provenance = "npm:@modelcontextprotocol/server-filesystem"
homepage = "https://github.com/modelcontextprotocol/servers"
approved = true
foundational = true
permissions = ["filesystem-read", "filesystem-write"]
install_scope = "project"
secrets = []
artifacts = []
mcp_name = "filesystem"
verify_argv = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "--help"]
catalog_version = "1"
  [[tool.match]]
  any_files = ["*"]
  weight = 2
  [[tool.apply]]
  apply_via = "claude_mcp"
  harness = "claude_code"
  mcp_command = "npx"
  mcp_args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
  [[tool.apply]]
  apply_via = "codex_mcp"
  harness = "codex"
  mcp_command = "npx"
  mcp_args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

